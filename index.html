<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKSV Bible Fetcher</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 2rem; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-bottom: 10px; }
        .btn-fetch { background-color: #3498db; color: white; }
        .btn-fetch:hover { background-color: #2980b9; }
        .btn-ai { background-color: #9b59b6; color: white; display: none; margin-top: 10px; }
        .btn-copy { background-color: #2ecc71; color: white; display: none; }
        textarea { width: 100%; height: 200px; margin-top: 15px; padding: 12px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; line-height: 1.6; resize: none; box-sizing: border-box; background-color: #fafafa; }
        .history { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: #e0eafc; padding: 5px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; color: #3498db; border: 1px solid #3498db; }
        .loading { text-align: center; display: none; color: #7f8c8d; font-size: 14px; margin: 10px 0; }
        #aiOutput { display: none; background: #fdf2ff; border: 1px solid #dcb0ea; padding: 15px; border-radius: 6px; margin-top: 10px; font-size: 14px; color: #4b2c5e; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 NKSV Fetcher</h2>
    <input type="text" id="verseInput" placeholder="예: 마태복음 1:1-3 또는 Mt 1:1">
    <div id="history" class="history"></div>
    <button class="btn-fetch" onclick="fetchVerse()">Fetch Verses</button>
    
    <div id="loading" class="loading">Searching...</div>
    <textarea id="output" readonly placeholder="Results appear here..."></textarea>
    
    <button id="copyBtn" class="btn-copy" onclick="copyText()">Copy to Clipboard</button>
    <button id="aiBtn" class="btn-ai" onclick="interpretAI()">Interpret with AI ✨</button>
    <div id="aiOutput"></div>
</div>

<script>
    // Load history on startup
    document.addEventListener('DOMContentLoaded', updateHistoryUI);

    async function fetchVerse(overrideInput = null) {
        const inputField = document.getElementById('verseInput');
        const input = overrideInput || inputField.value;
        if (overrideInput) inputField.value = overrideInput;

        const output = document.getElementById('output');
        const loading = document.getElementById('loading');
        
        if (!input) return alert("Enter a reference!");

        loading.style.display = 'block';
        output.value = '';
        document.getElementById('aiBtn').style.display = 'none';
        document.getElementById('aiOutput').style.display = 'none';

        try {
            const response = await fetch(`/.netlify/functions/getBible?ref=${encodeURIComponent(input)}`);
            const data = await response.text();

            if (response.ok) {
                output.value = data;
                document.getElementById('copyBtn').style.display = 'block';
                document.getElementById('aiBtn').style.display = 'block';
                saveToHistory(input);
            } else {
                output.value = data;
            }
        } catch (err) {
            output.value = "Connection error.";
        } finally {
            loading.style.display = 'none';
        }
    }

    function saveToHistory(ref) {
        let history = JSON.parse(localStorage.getItem('bibleHistory') || '[]');
        history = history.filter(item => item !== ref); // Remove duplicate
        history.unshift(ref); // Add to top
        localStorage.setItem('bibleHistory', JSON.stringify(history.slice(0, 5))); // Keep last 5
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const container = document.getElementById('history');
        const history = JSON.parse(localStorage.getItem('bibleHistory') || '[]');
        container.innerHTML = history.map(item => 
            `<span class="history-item" onclick="fetchVerse('${item}')">${item}</span>`
        ).join('');
    }

    function copyText() {
        const output = document.getElementById('output');
        output.select();
        document.execCommand('copy');
        alert("Copied!");
    }

    async function interpretAI() {
        const verses = document.getElementById('output').value;
        const aiOutput = document.getElementById('aiOutput');
        aiOutput.style.display = 'block';
        aiOutput.innerText = "AI is thinking...";

        // Logic for AI interpretation (See step 2 below)
        alert("To enable AI, we need to set up an 'interpret' function!");
    }
</script>
</body>
</html>
