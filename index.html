<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKSV Bible AI Fetcher</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; width: 100%; max-width: 550px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        h3 { color: #2c3e50; font-size: 18px; margin-top: 30px; margin-bottom: 10px; }

        /* Input & History */
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .history { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: #e0eafc; padding: 5px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; color: #3498db; border: 1px solid #b3cdef; transition: 0.2s; }
        .history-item:hover { background: #d0e0fb; }

        /* Buttons */
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        .btn-fetch { background-color: #3498db; color: white; }
        .btn-ai { background-color: #9b59b6; color: white; display: none; }
        .btn-copy { background-color: #2ecc71; color: white; display: none; }
        .btn-refine { background-color: #2c3e50; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Output Areas */
        textarea { width: 100%; height: 180px; margin-top: 10px; padding: 12px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; line-height: 1.6; resize: none; box-sizing: border-box; background-color: #fafafa; }
        #userDevotional { height: 120px; background-color: white; border: 1px solid #ddd; }

        /* AI Output Styles (Markdown Support) */
        #aiOutput, #refineOutput {
            display: none; 
            padding: 20px; 
            border-radius: 6px; 
            margin-top: 20px; 
            font-size: 15px; 
            line-height: 1.6;
        }
        
        #aiOutput { background: #fdf2ff; border: 1px solid #dcb0ea; color: #4b2c5e; }
        #refineOutput { background: #f0f4f8; border: 1px solid #bcccdc; color: #243b53; }

        /* Markdown 내부 요소 스타일 */
        .markdown-body ul { padding-left: 20px; margin: 10px 0; }
        .markdown-body li { margin-bottom: 8px; }
        .markdown-body strong { color: #2c3e50; }

        .loading { text-align: center; display: none; color: #7f8c8d; font-size: 14px; margin: 10px 0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 NKSV Bible AI</h2>

    <input type="text" id="verseInput" placeholder="예: Matthew 2:1-5, 마태 1:1">
    <div id="history" class="history"></div>

    <button class="btn-fetch" onclick="fetchVerse()">말씀 가져오기</button>
    <div id="loading" class="loading">찾는 중...</div>

    <textarea id="output" readonly placeholder="성경 구절이 여기 표시됩니다..."></textarea>

    <button id="copyBtn" class="btn-copy" onclick="copyText()">클립보드 복사</button>
    <button id="aiBtn" class="btn-ai" onclick="interpretAI()">AI 말씀 묵상 ✨</button>

    <div id="aiOutput" class="markdown-body"></div>

    <hr>

    <h3>✍️ 나의 묵상 기록 (Self Devotional)</h3>
    <textarea id="userDevotional" placeholder="오늘 느낀 점이나 묵상한 내용을 자유롭게 적어보세요..."></textarea>
    
    <button id="refineBtn" class="btn-refine" onclick="refineDevotional()">AI 문장 다듬기 ✨</button>
    
    <div id="refineOutput" class="markdown-body"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', updateHistoryUI);

    // 1. 성경 구절 가져오기
    async function fetchVerse(overrideInput = null) {
        const inputField = document.getElementById('verseInput');
        const input = overrideInput || inputField.value;
        if (overrideInput) inputField.value = overrideInput;

        const output = document.getElementById('output');
        const loading = document.getElementById('loading');
        const aiBtn = document.getElementById('aiBtn');
        const aiOutput = document.getElementById('aiOutput');

        if (!input) return alert("구절을 입력하세요!");

        loading.style.display = 'block';
        output.value = '';
        aiBtn.style.display = 'none';
        aiOutput.style.display = 'none';

        try {
            const res = await fetch(`/.netlify/functions/getBible?ref=${encodeURIComponent(input)}`);
            const data = await res.text();

            if (res.ok) {
                output.value = data;
                document.getElementById('copyBtn').style.display = 'block';
                aiBtn.style.display = 'block';
                saveToHistory(input);
            } else {
                output.value = data;
            }
        } catch (err) {
            output.value = "연결 오류가 발생했습니다.";
        } finally {
            loading.style.display = 'none';
        }
    }

    // 2. AI 말씀 묵상 해석
    async function interpretAI() {
        const verses = document.getElementById('output').value;
        const aiOutput = document.getElementById('aiOutput');
        const aiBtn = document.getElementById('aiBtn');

        aiOutput.style.display = 'block';
        aiOutput.innerHTML = "<em>AI가 말씀을 묵상 중입니다...</em>";
        aiBtn.disabled = true;

        try {
            const response = await fetch('/.netlify/functions/interpret', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ verses: verses })
            });
            const result = await response.text();
            aiOutput.innerHTML = marked.parse(result);
        } catch (err) {
            aiOutput.innerHTML = "AI 해석을 가져오지 못했습니다.";
        } finally {
            aiBtn.disabled = false;
        }
    }

    // 3. 나의 묵상 문장 다듬기
    async function refineDevotional() {
        const text = document.getElementById('userDevotional').value;
        const refineOutput = document.getElementById('refineOutput');
        const refineBtn = document.getElementById('refineBtn');

        if (!text) return alert("내용을 입력해주세요!");

        refineOutput.style.display = 'block';
        refineOutput.innerHTML = "<em>문장을 다듬는 중입니다...</em>";
        refineBtn.disabled = true;

        try {
            const response = await fetch('/.netlify/functions/refine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });
            const result = await response.text();
            refineOutput.innerHTML = marked.parse(result);
        } catch (err) {
            refineOutput.innerHTML = "문장을 다듬는 데 실패했습니다.";
        } finally {
            refineBtn.disabled = false;
        }
    }

    // 유틸리티 함수들
    function saveToHistory(ref) {
        let history = JSON.parse(localStorage.getItem('bibleHistory') || '[]');
        history = history.filter(item => item !== ref);
        history.unshift(ref);
        localStorage.setItem('bibleHistory', JSON.stringify(history.slice(0, 5)));
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const container = document.getElementById('history');
        const history = JSON.parse(localStorage.getItem('bibleHistory') || '[]');
        container.innerHTML = history.map(item => 
            `<span class="history-item" onclick="fetchVerse('${item}')">${item}</span>`
        ).join('');
    }

    function copyText() {
        const output = document.getElementById('output');
        output.select();
        document.execCommand('copy');
        alert("복사되었습니다!");
    }
</script>

</body>
</html>
