<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKSV Bible AI & Devotional</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; width: 100%; max-width: 550px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        h3 { color: #2c3e50; font-size: 18px; margin-top: 30px; margin-bottom: 10px; }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        /* 자동 확장 텍스트 영역 */
        textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
            background-color: #fafafa; 
            line-height: 1.6;
            min-height: 100px;
            overflow: hidden; 
            resize: none; 
            transition: height 0.1s ease;
        }

        .history { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: #e0eafc; padding: 5px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; color: #3498db; border: 1px solid #b3cdef; }

        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        .btn-fetch { background-color: #3498db; color: white; }
        .btn-ai { background-color: #9b59b6; color: white; display: none; }
        .btn-copy { background-color: #2ecc71; color: white; }
        .btn-refine { background-color: #2c3e50; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .count-label { text-align: right; font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }
        
        #aiOutput, #refineOutput { 
            display: none; padding: 20px; border-radius: 6px; margin-top: 15px; font-size: 15px; line-height: 1.6; 
        }
        #aiOutput { background: #fdf2ff; border: 1px solid #dcb0ea; color: #4b2c5e; }
        #refineOutput { background: #f0f4f8; border: 1px solid #bcccdc; color: #243b53; }

        .markdown-body ul { padding-left: 20px; margin: 10px 0; }
        .markdown-body li { margin-bottom: 8px; }
        .loading { text-align: center; display: none; color: #7f8c8d; font-size: 14px; margin: 10px 0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 NKSV Bible AI</h2>

    <input type="text" id="verseInput" placeholder="예: Matthew 2:1-5, 마태 1:1">
    <div id="history" class="history"></div>
    <button class="btn-fetch" onclick="fetchVerse()">말씀 가져오기</button>
    <div id="loading" class="loading">찾는 중...</div>
    
    <textarea id="output" readonly placeholder="성경 구절이 표시됩니다..." oninput="autoExpand(this)"></textarea>
    
    <button id="copyBtn" class="btn-copy" style="display:none;" onclick="copyText('output')">구절 복사</button>
    <button id="aiBtn" class="btn-ai" onclick="interpretAI()">AI 말씀 묵상 ✨</button>
    <div id="aiOutput" class="markdown-body"></div>

    <hr>

    <h3>✍️ 나의 묵상 기록</h3>
    <div class="count-label">원본 글자 수: <span id="originalCount">0</span>자</div>
    
    <textarea id="userDevotional" 
              placeholder="오늘의 묵상을 기록하세요..." 
              oninput="updateDevotional(this)"></textarea>
    
    <button id="refineBtn" class="btn-refine" onclick="refineDevotional()">AI 문장 다듬기 (500자 제한) ✨</button>
    
    <div id="refineResultArea" style="display: none;">
        <div class="count-label" style="text-align: left; font-weight: bold;">다듬어진 묵상 (수정 후: <span id="modifiedCount">0</span>자)</div>
        <div id="refineOutput" class="markdown-body" style="display:block;"></div>
        <button id="copyRefineBtn" class="btn-copy" onclick="copyRefinedText()">다듬어진 문장 복사</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', updateHistoryUI);

    // --- 텍스트 영역 자동 확장 공통 로직 ---
    function autoExpand(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    // --- 실시간 글자 수 및 확장 업데이트 ---
    function updateDevotional(el) {
        autoExpand(el);
        document.getElementById('originalCount').innerText = el.value.length;
    }

    // --- 성경 구절 가져오기 ---
    async function fetchVerse(overrideInput = null) {
        const inputField = document.getElementById('verseInput');
        const input = overrideInput || inputField.value;
        if (overrideInput) inputField.value = overrideInput;
        
        const output = document.getElementById('output');
        const loading = document.getElementById('loading');

        if (!input) return alert("구절을 입력하세요!");
        loading.style.display = 'block';
        
        try {
            const res = await fetch(`/.netlify/functions/getBible?ref=${encodeURIComponent(input)}`);
            const data = await res.text();
            output.value = data;
            
            // 데이터 로드 후 자동 확장 실행
            setTimeout(() => autoExpand(output), 10);
            
            document.getElementById('copyBtn').style.display = 'block';
            document.getElementById('aiBtn').style.display = 'block';
            saveToHistory(input);
        } catch (err) { output.value = "연결 오류"; }
        finally { loading.style.display = 'none'; }
    }

    // --- AI 말씀 묵상 해석 ---
    async function interpretAI() {
        const verses = document.getElementById('output').value;
        const aiOutput = document.getElementById('aiOutput');
        aiOutput.style.display = 'block';
        aiOutput.innerHTML = "<em>AI가 말씀을 묵상 중입니다...</em>";
        try {
            const res = await fetch('/.netlify/functions/interpret', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ verses })
            });
            const data = await res.text();
            aiOutput.innerHTML = marked.parse(data);
        } catch (err) { aiOutput.innerHTML = "AI 오류가 발생했습니다."; }
    }

    // --- AI 문장 다듬기 (성경 구절 맥락 포함) ---
    async function refineDevotional() {
        const devotionalText = document.getElementById('userDevotional').value;
        const bibleContext = document.getElementById('output').value; // 성경 구절 데이터 가져오기
        
        const resultArea = document.getElementById('refineResultArea');
        const refineOutput = document.getElementById('refineOutput');
        const modifiedCount = document.getElementById('modifiedCount');
        const refineBtn = document.getElementById('refineBtn');

        if (!devotionalText) return alert("내용을 입력하세요!");

        resultArea.style.display = 'block';
        refineOutput.innerHTML = "<em>맥락을 분석하여 다듬는 중...</em>";
        refineBtn.disabled = true;

        try {
            const res = await fetch('/.netlify/functions/refine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    text: devotionalText,
                    context: bibleContext // 성경 구절 정보를 함께 전송
                })
            });
            const data = await res.text();
            
            modifiedCount.innerText = data.length;
            refineOutput.innerHTML = marked.parse(data);
            refineOutput.setAttribute('data-raw', data); 
        } catch (err) { 
            refineOutput.innerHTML = "다듬기 실패: " + err.message; 
        } finally { 
            refineBtn.disabled = false; 
        }
    }

    // --- 유틸리티 함수 (복사/히스토리) ---
    function copyText(id) {
        const el = document.getElementById(id);
        navigator.clipboard.writeText(el.value).then(() => alert("복사되었습니다!"));
    }

    function copyRefinedText() {
        const text = document.getElementById('refineOutput').getAttribute('data-raw');
        navigator.clipboard.writeText(text).then(() => alert("다듬어진 문장이 복사되었습니다!"));
    }

    function saveToHistory(ref) {
        let history = JSON.parse(localStorage.getItem('bibleHistory') || '[]');
        history = history.filter(i => i !== ref);
        history.unshift(ref);
        localStorage.setItem('bibleHistory', JSON.stringify(history.slice(0, 5)));
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const container = document.getElementById('history');
        const history = JSON.parse(localStorage.getItem('bibleHistory') || '[]');
        container.innerHTML = history.map(item => 
            `<span class="history-item" onclick="fetchVerse('${item}')">${item}</span>`
        ).join('');
    }
</script>
</body>
</html>
