<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKSV Bible Fetcher</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 2rem; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-fetch { background-color: #3498db; color: white; margin-bottom: 10px; }
        .btn-fetch:hover { background-color: #2980b9; }
        .btn-copy { background-color: #2ecc71; color: white; display: none; }
        textarea { width: 100%; height: 250px; margin-top: 15px; padding: 12px; border: 1px solid #eee; border-radius: 6px; font-size: 14px; line-height: 1.6; resize: none; box-sizing: border-box; background-color: #fafafa; }
        .loading { text-align: center; display: none; color: #7f8c8d; font-size: 14px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 NKSV Fetcher</h2>
    <input type="text" id="verseInput" placeholder="예: 마태복음 1:1-3 또는 Mt 1:1">
    <button class="btn-fetch" onclick="fetchVerse()">Fetch Verses</button>
    <div id="loading" class="loading">Searching the scriptures...</div>
    <textarea id="output" readonly placeholder="Results will appear here..."></textarea>
    <button id="copyBtn" class="btn-copy" onclick="copyText()">Copy to Clipboard</button>
</div>

<script>
    async function fetchVerse() {
        const input = document.getElementById('verseInput').value;
        const output = document.getElementById('output');
        const loading = document.getElementById('loading');
        const copyBtn = document.getElementById('copyBtn');

        if (!input) return alert("Please enter a reference!");

        // Show loading, hide old results
        loading.style.display = 'block';
        output.value = '';
        copyBtn.style.display = 'none';

        try {
            // Netlify function URL
            const response = await fetch(`/.netlify/functions/getBible?ref=${encodeURIComponent(input)}`);
            const data = await response.text();

            if (response.ok) {
                output.value = data;
                copyBtn.style.display = 'block';
            } else {
                output.value = "Error: " + data;
            }
        } catch (err) {
            output.value = "Failed to connect to the server.";
        } finally {
            loading.style.display = 'none';
        }
    }

    function copyText() {
        const output = document.getElementById('output');
        output.select();
        document.execCommand('copy');
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
