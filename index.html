<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible AI Comparison</title>
    <style>
        /* --- General Layout --- */
        body { font-family: -apple-system, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-fetch { background-color: #3498db; color: white; }
        .btn-ai { background-color: #9b59b6; color: white; display: none; }
        textarea { width: 100%; height: 150px; margin-top: 15px; padding: 12px; border: 1px solid #eee; border-radius: 6px; resize: none; box-sizing: border-box; background-color: #fafafa; }
        .history { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: #e0eafc; padding: 5px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; color: #3498db; }
        
        /* --- Option 1: Original --- */
        .ai-original {
            display: none; background: #fdf2ff; border: 1px solid #dcb0ea; padding: 15px; border-radius: 6px; margin-top: 20px; font-size: 14px; white-space: pre-wrap;
        }

        /* --- Option 2: Devotional Note --- */
        .ai-devotional {
            display: none; background: #fdfaf6; border-left: 5px solid #9b59b6; padding: 20px; margin-top: 20px; font-family: "Georgia", serif; line-height: 1.8; box-shadow: 0 4px 15px rgba(0,0,0,0.05); white-space: pre-wrap;
        }
        .ai-devotional::before { content: "오늘의 묵상 (Devotional Note)"; display: block; font-weight: bold; color: #9b59b6; margin-bottom: 10px; font-size: 12px; text-transform: uppercase; }

        /* --- Option 3: Post-it Note --- */
        .ai-postit {
            display: none; background: #fffa90; padding: 25px; margin-top: 40px; width: 85%; margin-left: auto; margin-right: auto; font-size: 14px; line-height: 1.6; box-shadow: 5px 5px 10px rgba(0,0,0,0.1); transform: rotate(-1deg); position: relative; white-space: pre-wrap;
        }
        .ai-postit::after { content: ""; position: absolute; top: -10px; left: 30%; width: 40%; height: 20px; background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 Bible AI Compare</h2>
    <input type="text" id="verseInput" placeholder="Matthew 2:1-5">
    <div id="history" class="history"></div>
    <button class="btn-fetch" onclick="fetchVerse()">Fetch</button>
    <textarea id="output" readonly></textarea>
    
    <button id="aiBtn" class="btn-ai" onclick="interpretAI()">Interpret All Styles ✨</button>

    <div id="style1" class="ai-original"></div>
    <div id="style2" class="ai-devotional"></div>
    <div id="style3" class="ai-postit"></div>
</div>

<script>
    async function fetchVerse(overrideInput = null) {
        const input = overrideInput || document.getElementById('verseInput').value;
        const output = document.getElementById('output');
        try {
            const res = await fetch(`/.netlify/functions/getBible?ref=${encodeURIComponent(input)}`);
            const text = await res.text();
            output.value = text;
            document.getElementById('aiBtn').style.display = 'block';
        } catch (e) { output.value = "Fetch Error"; }
    }

    async function interpretAI() {
        const verses = document.getElementById('output').value;
        const boxes = [document.getElementById('style1'), document.getElementById('style2'), document.getElementById('style3')];
        
        boxes.forEach(b => { b.style.display = 'block'; b.innerText = "Thinking..."; });

        try {
            const response = await fetch('/.netlify/functions/interpret', {
                method: 'POST',
                body: JSON.stringify({ verses: verses })
            });
            const result = await response.text();
            boxes.forEach(b => b.innerText = result);
        } catch (err) {
            boxes.forEach(b => b.innerText = "AI Failed. Check logs.");
        }
    }
</script>
</body>
</html>
